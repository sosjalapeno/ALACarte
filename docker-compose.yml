services:
  wrapper:
    build:
      context: ./wrapper
      dockerfile: Dockerfile
    image: alacarte-wrapper:local
    container_name: alacarte-wrapper
    # Wrapper binary + upstream rootfs are amd64-only. Pinning the platform makes
    # the build/run path explicit on arm64 hosts (Apple Silicon emulates via Rosetta).
    platform: linux/amd64
    volumes:
      - ./data/wrapper:/app/rootfs/data
    # Bypass the image's `bash -c "/app/wrapper $args"` entrypoint and hand
    # argv straight to the binary — avoids all shell-quoting pitfalls.
    entrypoint: ["/app/wrapper"]
    command: ["-H", "0.0.0.0"]
    expose:
      - "10020"
      - "20020"
      - "30020"
    networks:
      - alacarte-net
    # on-failure (not unless-stopped) so clean exit due to missing creds doesn't
    # loop forever — the web container surfaces an "enter Apple creds" banner.
    restart: on-failure

  web:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: alacarte-web
    # Upstream apple-music-downloader image is published amd64-only.
    platform: linux/amd64
    depends_on:
      - wrapper
    environment:
      - PORT=7373
      - AMDL_WRAPPER_HOST=alacarte-wrapper
      - AMDL_WRAPPER_DECRYPT_PORT=10020
      - AMDL_WRAPPER_M3U8_PORT=20020
      - AMDL_WRAPPER_ACCOUNT_PORT=30020
      - AMDL_MUSIC_PATH=/music
      - AMDL_CONFIG_DIR=/config
      - AMDL_SECRET_KEY=${AMDL_SECRET_KEY:-}
      - AUTH_DISABLED=${AUTH_DISABLED:-false}
      - TRUST_PROXY=${TRUST_PROXY:-loopback}
    volumes:
      - ./data/web:/config
      - ${MUSIC_PATH:?Set MUSIC_PATH in .env}:/music
      # Shared with the wrapper container so the web UI can drop a 2fa.txt file
      # when the Apple ID requires a 2FA code (wrapper polls this path).
      - ./data/wrapper:/wrapper-data
      # Required so the web UI can run first-time Apple ID login for the
      # wrapper container automatically. Treat this as root-on-host access;
      # only expose the web UI on trusted networks.
      - /var/run/docker.sock:/var/run/docker.sock
    # Default (WEB_BIND unset/empty) publishes on all interfaces — same as
    # docker's default. Set WEB_BIND=127.0.0.1 in .env to restrict the UI to
    # the host machine only when fronting with a reverse proxy.
    ports:
      - "${WEB_BIND:-0.0.0.0}:${WEB_PORT:-7373}:7373"
    networks:
      - alacarte-net
    restart: unless-stopped

networks:
  alacarte-net:
    name: ${DOCKER_NETWORK:-alacarte-net}
    external: ${DOCKER_NETWORK_EXTERNAL:-false}
